<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="robots" content="nofollow,noarchive,noindex">
  <title>{{ code }}: {{ message }}</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- {{ if or (eq code 408) (eq code 425) (eq code 429) (eq code 500) (eq code 502) (eq code 503) (eq code 504) }} -->
  <meta http-equiv="refresh" content="30">
  <!-- {{ end }} -->
  <meta name="title" content="{{ code }}: {{ message | escape }}">
  <meta name="description" content="{{ description | escape }}">
  <meta property="og:title" content="{{ code }}: {{ message | escape }}">
  <meta property="og:description" content="{{ description | escape }}">
  <meta property="twitter:title" content="{{ code }}: {{ message | escape }}">
  <meta property="twitter:description" content="{{ description | escape }}">
  <style>
    :root {
      --color-primary: #fff;
      --color-inverted: #202020;
      --color-snail: #f5f5f5;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-primary: #1a1a1a;
        --color-inverted: #fff;
        --color-snail: #eee;
      }
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      height: 100%;
      width: 100%;
      background-color: var(--color-primary);
      color: var(--color-inverted);
      font-family: sans-serif;
      font-size: 16px;
      word-break: keep-all;
    }

    @media screen and (min-width: 2000px) {
      html, body {
        font-size: 20px;
      }
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
    }

    article {
      text-align: center;
      width: 100%;
    }

    article .snail {
      animation: float 3s ease-out infinite;
    }

    @keyframes float {
      50% {
        transform: translate(0, 20px);
      }
    }

    article .shadowFrame {
      width: 130px;
      margin: 10px auto 0 auto;
    }

    article .shadowFrame .shadow {
      animation: shrink 3s ease-out infinite;
      transform-origin: center center;
    }

    @keyframes shrink {
      0% {
        width: 90%;
        margin: 0 5%;
      }
      50% {
        width: 60%;
        margin: 0 18%;
      }
      100% {
        width: 90%;
        margin: 0 5%;
      }
    }

    article h3 {
      font-size: 1.5em;
      text-transform: uppercase;
      margin: 0.3em auto;
    }

    article .description {
      font-size: 0.9em;
      opacity: .9;
    }

    /* {{ if show_details }} */
    table.details {
      table-layout: fixed;
      width: 100%;
      opacity: .6;
    }

    table.details td {
      white-space: nowrap;
      font-size: 0.7em;
    }

    table.details .name,
    table.details .value {
      width: 50%;
    }

    table.details .name::first-letter,
    table.details .value::first-letter {
      font-weight: bold;
    }

    table.details .name {
      text-align: right;
      padding-right: .4em;
      width: 50%;
    }

    table.details .value {
      text-align: left;
      padding-left: .4em;
      font-family: monospace;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    /* {{ end }} */
  </style>
</head>
<body>
<article>
  <svg class="snail" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" style="height: 200px; width: 200px;">
    <g transform="translate(-4,-107)">
      <path d="M80 40.998A38.867 38.867 0 0 0 40.998 80c0 1.848.136 3.662.38 5.44C45.395 76.946 54.065 71.001 64 71.001 77.7 71.002 88.998 82.3 88.998 96c0 9.936-5.945 18.606-14.437 22.621 1.777.245 3.591.38 5.439.38A38.867 38.867 0 0 0 119.002 80 38.867 38.867 0 0 0 80 40.998zm352 0A38.867 38.867 0 0 0 392.998 80c0 1.848.136 3.662.38 5.44 4.016-8.493 12.686-14.438 22.622-14.438 13.7 0 24.998 11.298 24.998 24.998 0 9.936-5.945 18.606-14.437 22.621 1.777.245 3.591.38 5.439.38A38.867 38.867 0 0 0 471.002 80 38.867 38.867 0 0 0 432 40.998zm-321.275 86.943a56.724 56.724 0 0 1-16.59 7.274c21.12 67.375 42.902 135.878 93.302 204.107-26.003 28.733-63.381 55.814-96.1 79.922-18.982 13.987-36.346 26.921-48.56 37.938-6.106 5.508-10.91 10.557-13.908 14.675-1.791 2.461-2.676 4.326-3.217 5.807 2.415 1.166 6.945 2.683 12.979 4.063 12.369 2.827 30.885 5.33 53.166 7.31 44.56 3.961 104.403 5.965 164.203 5.965s119.642-2.004 164.203-5.965c22.28-1.98 40.797-4.483 53.166-7.31 6.034-1.38 10.564-2.897 12.979-4.063-.541-1.48-1.426-3.346-3.217-5.807-2.998-4.118-7.802-9.167-13.908-14.675-12.214-11.017-29.578-23.95-48.56-37.938-32.719-24.108-70.097-51.189-96.1-79.922 50.4-68.229 72.182-136.732 93.302-204.107a56.724 56.724 0 0 1-16.59-7.274c-21.681 69.07-42.994 136.918-93.986 204.44-45.172 10.928-57.406 10.928-102.578 0-50.992-67.522-72.305-135.37-93.986-204.44zM199.002 384h17.996c0 20.5-15.2 34.988-32.228 45.63-17.03 10.644-37.281 18.687-52.745 26.419l-8.05-16.098c16.536-8.268 36.284-16.225 51.255-25.582 14.972-9.357 23.772-18.869 23.772-30.369zm96 0h17.996c0 11.5 8.8 21.012 23.772 30.37 14.97 9.356 34.719 17.313 51.255 25.581l-8.05 16.098c-15.464-7.732-35.716-15.775-52.745-26.418-17.028-10.643-32.228-25.131-32.228-45.631z" fill="var(--color-inverted)" fill-opacity="1"></path>
    </g>
  </svg>

  <p class="shadowFrame">
    <svg class="shadow" xmlns="http://www.w3.org/2000/svg" x="61px" y="20px" width="122.436px" height="39.744px"
         viewBox="0 0 122.436 39.744" xml:space="preserve">
        <ellipse style="fill: var(--color-snail); opacity: 0.1" cx="61.128" cy="19.872" rx="49.25" ry="8.916"></ellipse>
      </svg>
  </p>

  <h3><span data-l10n>Error</span> {{ code }}</h3>
  <p class="description" data-l10n>{{ description }}</p>

  <!-- {{- if show_details -}} -->
  <table class="details">
    <tbody>
    <!-- {{- if host -}} -->
    <tr>
      <td class="name" data-l10n>Host</td>
      <td class="value">{{ host }}</td>
    </tr>
    <!-- {{- end }}{{ if original_uri -}} -->
    <tr>
      <td class="name" data-l10n>Original URI</td>
      <td class="value">{{ original_uri }}</td>
    </tr>
    <!-- {{- end }}{{ if forwarded_for -}} -->
    <tr>
      <td class="name" data-l10n>Forwarded for</td>
      <td class="value">{{ forwarded_for }}</td>
    </tr>
    <!-- {{- end }}{{ if namespace -}} -->
    <tr>
      <td class="name" data-l10n>Namespace</td>
      <td class="value">{{ namespace }}</td>
    </tr>
    <!-- {{- end }}{{ if ingress_name -}} -->
    <tr>
      <td class="name" data-l10n>Ingress name</td>
      <td class="value">{{ ingress_name }}</td>
    </tr>
    <!-- {{- end }}{{ if service_name -}} -->
    <tr>
      <td class="name" data-l10n>Service name</td>
      <td class="value">{{ service_name }}</td>
    </tr>
    <!-- {{- end }}{{ if service_port -}} -->
    <tr>
      <td class="name" data-l10n>Service port</td>
      <td class="value">{{ service_port }}</td>
    </tr>
    <!-- {{- end }}{{ if request_id -}} -->
    <tr>
      <td class="name" data-l10n>Request ID</td>
      <td class="value">{{ request_id }}</td>
    </tr>
    <!-- {{- end -}} -->
    <tr>
      <td class="name" data-l10n>Timestamp</td>
      <td class="value">{{ nowUnix }}</td>
    </tr>
    </tbody>
  </table>
  <!-- {{- end -}} -->
</article>

<!-- {{- if l10n_enabled -}} -->
<script>// {{ l10nScript }}</script>
<!-- {{- end -}} -->
</body>
</html>
